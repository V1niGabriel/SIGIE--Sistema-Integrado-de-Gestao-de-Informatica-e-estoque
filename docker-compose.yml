services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigie
      POSTGRES_PASSWORD: sigie_dev
      POSTGRES_DB: sigie_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigie -d sigie_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "bundle install && bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0"
    volumes:
      # Monta o código local dentro do container — qualquer edição local reflete imediatamente
      - .:/rails
      # Cache de gems separado para não sobrescrever a instalação do container
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DB_HOST: db
      POSTGRES_USER: sigie
      POSTGRES_PASSWORD: sigie_dev
    depends_on:
      db:
        condition: service_healthy
    # Reinicia automaticamente se o processo travar
    restart: unless-stopped

volumes:
  postgres_data:
  bundle_cache:
